<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UFN</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

header{
    padding:18px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,.08);
}

header h2{
    font-size:22px;
}

header p{
    color:#9ca3af;
    margin-top:4px;
    font-size:14px;
}

.lemari{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    padding:20px;
}

.enve{
    background:#1b2942;
    border:2px solid #ffc300;
    border-radius:10px 16px;
    padding:18px 10px;
    text-align:center;
    transition:.2s;
}

.enve:active{
    transform:scale(.96);
}

.enve a{
    color:#fff;
    text-decoration:none;
    font-size:28px;
    display:block;
}

.enve span{
    display:block;
    margin-top:10px;
    font-size:14px;
    color:#d1d5db;
}

footer{
    position:fixed;
    bottom:15px;
    width:100%;
    text-align:center;
    color:#6b7280;
    font-size:12px;
}
</style>

</head>
<body>

<header>
    <h2>UFN</h2>
    <p>Menu Utama</p>
</header>

<div class="lemari">

    <div class="enve">
        <a href="UNF-donwload.html">
            <i class="fa-solid fa-clock"></i>
        </a>
        <span>Waktu</span>
    </div>

    <div class="enve">
        <a href="cuaca.html">
            <i class="fa-solid fa-sun"></i>
        </a>
        <span>Cuaca</span>
    </div>

    <div class="enve">
        <a href="berita.html">
            <i class="fa-solid fa-newspaper"></i>
        </a>
        <span>Berita</span>
    </div>

    <div class="enve">
        <a href="maps.html">
            <i class="fa-solid fa-location-dot"></i>
        </a>
        <span>Maps</span>
    </div>

    <div class="enve">
        <a href="List.html">
            <i class="fa-solid fa-list"></i>
        </a>
        <span>daftar negara</span>
    </div>

</div>

<footer>
    UFN © 2026
</footer>

</body>
</html>
