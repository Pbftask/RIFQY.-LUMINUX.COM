<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Halaman Ditutup</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#07111f,#0f1f38,#142b4d);
    color:#fff;
}

/* Background */
body::before{
    content:"";
    position:fixed;
    inset:-20%;
    background:
    radial-gradient(circle,#3b82f655 0%,transparent 35%),
    radial-gradient(circle,#06b6d455 0%,transparent 30%),
    radial-gradient(circle,#8b5cf655 0%,transparent 35%);
    animation:bgMove 18s linear infinite;
    filter:blur(70px);
}

@keyframes bgMove{
    from{transform:rotate(0deg) scale(1);}
    to{transform:rotate(360deg) scale(1.2);}
}

/* Card */
.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:430px;
    padding:35px;
    text-align:center;
    border-radius:24px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 20px 45px rgba(0,0,0,.35);
    animation:show .8s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(30px) scale(.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

/* Icon */
.icon{
    font-size:80px;
    animation:float 3s ease-in-out infinite;
}

.icon img{
  width: 90%;
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

h1{
    margin-top:15px;
    font-size:30px;
    font-weight:700;
}

p{
    margin:15px 0 28px;
    line-height:1.7;
    color:#dbeafe;
    font-size:15px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    color:#fff;
    background:linear-gradient(90deg,#3b82f6,#06b6d4);
    transition:.3s;
}

button:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 0 25px #3b82f688;
}

/* Loading bar */
.bar{
    width:100%;
    height:5px;
    background:rgba(255,255,255,.1);
    border-radius:20px;
    margin-top:25px;
    overflow:hidden;
}

.bar span{
    display:block;
    width:35%;
    height:100%;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    border-radius:20px;
    animation:loading 2s linear infinite;
}

@keyframes loading{
    from{
        transform:translateX(-120%);
    }
    to{
        transform:translateX(350%);
    }
}
</style>
</head>
<body>

<div class="card">
    <div class="icon">
      <img src="https://i.ibb.co.com/gMBQB65G/New-Project-53-2-A88-ED6.png" alt="logo">
    </div>

    <h1>LuminUX</h1>

    <p>
        Mohon maaf,aplikasi ini di tutup karena kerugian<br>
        LuminUX rugi sekitar Rp150.000
    </p>

    <button onclick="window.location.href='game.html'">
        main mini game
    </button>

    <div class="bar">
        <span></span>
    </div>
</div>

</body>
</html>
