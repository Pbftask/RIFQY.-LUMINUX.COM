<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

.bg{
    position: fixed;
    inset: 0;
    background:#0F172A center/cover repeat;
    z-index: -1;
}

/* Navigasi */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:60px;
    background:#111;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    z-index:1000;
}

.logo{
    color:#fff;
    font-size:22px;
    font-weight:bold;
}

.menu{
    display:flex;
    gap:20px;
}

.menu a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

.menu a:hover{
    color:#00bfff;
}

main{
    margin-top:80px;
    padding:20px;
}
</style>
</head>
<body>

  <div class="bg"></div>

<nav>
    <div class="logo">AKAN HADIR FITUR BARU</div>
</nav>

</body>
</html>
